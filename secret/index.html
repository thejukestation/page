<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>you found it.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --cream: #e8dcc8; --purple: #b89be0; --muted: rgba(232,220,200,0.55); }
    html, body { width: 100%; min-height: 100vh; background: #05030f; color: var(--cream); font-family: 'Press Start 2P', monospace; overflow-x: hidden; }

    .bg { position: fixed; inset: 0; background: url('../images/STARS.jpg') center/cover no-repeat; opacity: 0.9; z-index: 0; }
    .bg-overlay { position: fixed; inset: 0; background: rgba(0,0,5,0.25); z-index: 0; }

    /* DUNE — zoomed in more than homepage */
    .dune {
      position: fixed;
      bottom: -160px; left: -10%;
      width: 120%;
      height: auto;
      z-index: 1;
      pointer-events: none;
    }

    .back { position: fixed; top: 24px; left: 36px; z-index: 10; font-size: clamp(10px, 1.2vw, 14px); color: var(--muted); text-decoration: none; letter-spacing: 0.06em; transition: color 0.2s; display: flex; align-items: center; gap: 8px; }
    .back:hover { color: var(--cream); }
    .back::before { content: '◄'; font-size: 0.8em; }

    .page { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 36px; padding: 70px 40px 280px; max-width: 680px; margin: 0 auto; text-align: center; }

    /* ANIMATION */
    .anim-slot {
      width: clamp(220px, 44vw, 380px);
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 80px rgba(184,155,224,0.35), 0 0 160px rgba(184,155,224,0.12);
    }
    .anim-slot video { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* TEXT */
    .congrats { font-size: clamp(9px, 1.1vw, 13px); color: var(--purple); letter-spacing: 0.2em; text-shadow: 0 0 20px rgba(184,155,224,0.6); }
    .message { font-family: 'VT323', monospace; font-size: clamp(20px, 2.6vw, 32px); color: var(--cream); line-height: 1.7; }

    /* PLAYER */
    .player-box {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(184,155,224,0.2);
      border-radius: 6px;
      padding: 22px 26px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .player-track { font-family: 'VT323', monospace; font-size: clamp(18px, 2.2vw, 26px); color: var(--cream); min-height: 1.3em; }
    .player-track span { color: var(--purple); }

    .player-controls { display: flex; align-items: center; gap: 10px; }

    .ctrl-btn {
      background: none;
      border: 1px solid rgba(184,155,224,0.3);
      border-radius: 3px;
      color: var(--purple);
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(5px, 0.6vw, 7px);
      letter-spacing: 0.08em;
      padding: 8px 10px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: rgba(184,155,224,0.1); border-color: var(--purple); color: var(--cream); }

    .ctrl-btn-play {
      background: none;
      border: 1px solid rgba(184,155,224,0.4);
      border-radius: 3px;
      color: var(--purple);
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .ctrl-btn-play:hover { background: rgba(184,155,224,0.12); }

    .progress-bar { flex: 1; height: 3px; background: rgba(232,220,200,0.12); border-radius: 2px; cursor: pointer; position: relative; }
    .progress-fill { height: 100%; background: var(--purple); border-radius: 2px; width: 0%; transition: width 0.1s; }
    .player-time { font-family: 'VT323', monospace; font-size: 15px; color: var(--muted); min-width: 40px; text-align: right; }

    .vol-row { display: flex; align-items: center; gap: 8px; }
    .vol-label { font-size: 7px; color: var(--muted); letter-spacing: 0.1em; }
    input[type=range].vol-slider { flex: 1; height: 2px; cursor: pointer; accent-color: var(--purple); background: rgba(232,220,200,0.12); border-radius: 2px; appearance: none; -webkit-appearance: none; }
    input[type=range].vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--purple); cursor: pointer; }

    @media (max-width: 640px) {
      .back { top: 14px; left: 16px; font-size: 9px; }
      .page { padding: 60px 20px 220px; gap: 24px; }
      .dune { bottom: -80px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-overlay"></div>
  <img class="dune" src="../images/DUNE.webp" alt="">
  <a class="back" href="/">back</a>

  <div class="page">

    <div class="anim-slot">
      <video src="../images/HIMMELANIMATION.mp4" autoplay loop muted playsinline></video>
    </div>

    <div class="congrats">★ congratulations! you found the secret page. ★</div>

    <p class="message">now sit back, relax<br>and enjoy the music.</p>

    <div class="player-box">
      <div class="player-track">now playing: <span id="track-name">—</span></div>
      <div class="player-controls">
        <button class="ctrl-btn" id="btn-prev">◄ prev</button>
        <button class="ctrl-btn-play" id="btn-play">►</button>
        <div class="progress-bar" id="prog-bar">
          <div class="progress-fill" id="prog-fill"></div>
        </div>
        <div class="player-time" id="player-time">0:00</div>
        <button class="ctrl-btn" id="btn-next">next ►</button>
      </div>
      <div class="vol-row">
        <span class="vol-label">VOL</span>
        <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="0.3">
      </div>
    </div>

  </div>

  <audio id="secret-audio"></audio>

  <script>
    // ─── ADD YOUR SECRET TRACKS HERE ───────────────────────────────
    const playlist = [
      { name: "track name here", src: "../audio/secret01.mp3" },
      { name: "track name here", src: "../audio/secret02.mp3" },
      { name: "track name here", src: "../audio/secret03.mp3" },
    ];
    // ────────────────────────────────────────────────────────────────

    const audio     = document.getElementById('secret-audio');
    const btnPlay   = document.getElementById('btn-play');
    const btnNext   = document.getElementById('btn-next');
    const btnPrev   = document.getElementById('btn-prev');
    const fill      = document.getElementById('prog-fill');
    const timeEl    = document.getElementById('player-time');
    const trackEl   = document.getElementById('track-name');
    const progBar   = document.getElementById('prog-bar');
    const volSlider = document.getElementById('vol-slider');

    let currentIdx = -1;
    audio.volume = 0.3;

    function fmt(s) {
      return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
    }

    function loadAndPlay(idx) {
      currentIdx = idx;
      audio.src = playlist[idx].src;
      trackEl.textContent = playlist[idx].name;
      fill.style.width = '0%';
      timeEl.textContent = '0:00';
      audio.play().then(() => { btnPlay.textContent = '▐▐'; }).catch(() => {});
    }

    function randomExcept(except) {
      if (playlist.length === 1) return 0;
      let n;
      do { n = Math.floor(Math.random() * playlist.length); } while (n === except);
      return n;
    }

    btnPlay.addEventListener('click', () => {
      if (playlist.length === 0) return;
      if (currentIdx === -1) { loadAndPlay(randomExcept(-1)); return; }
      if (audio.paused) {
        audio.play().then(() => { btnPlay.textContent = '▐▐'; }).catch(() => {});
      } else {
        audio.pause(); btnPlay.textContent = '►';
      }
    });

    btnNext.addEventListener('click', () => { loadAndPlay(randomExcept(currentIdx)); });

    btnPrev.addEventListener('click', () => {
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
      } else {
        loadAndPlay(randomExcept(currentIdx));
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      timeEl.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('ended', () => { loadAndPlay(randomExcept(currentIdx)); });

    progBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progBar.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });

    volSlider.addEventListener('input', () => { audio.volume = parseFloat(volSlider.value); });

    document.addEventListener('touchstart', () => {
      try { const p = audio.play(); if (p) p.then(() => audio.pause()).catch(() => {}); } catch(e) {}
    }, { once: true });

    window.addEventListener('load', () => {
      if (playlist.length > 0) {
        currentIdx = Math.floor(Math.random() * playlist.length);
        audio.src = playlist[currentIdx].src;
        trackEl.textContent = playlist[currentIdx].name;
      }
    });
  </script>
</body>
</html>
